name: Deploy to Hugging Face

on:
  push:
    branches: [ main ]

jobs:
  sync-to-spaces:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitHub Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Hugging Face Hub
        run: pip install huggingface_hub

      - name: Push Backend to automl-engine Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: huggingface-cli upload fedede/automl-engine ./backend . --repo-type space --token $HF_TOKEN

      - name: Push Frontend to Streamlit Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: huggingface-cli upload fedede/auto-ml-frontend ./frontend . --repo-type space --token $HF_TOKEN